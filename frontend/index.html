<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="app-header py-5 mb-5">
        <div class="container">
            <h1 class="text-white text-center fw-bold">Task Manager!</h1>
        </div>
    </header>

    <main class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-7 col-lg-7">
                <div class="card shadow">
                    <div class="card-body p-4">
                        <h2 class="card-title text-center mb-4 fw-bold">To Do List</h2>

                        <div class="mb-3">
                            <input id="task-input" type="text" class="form-control mb-2" placeholder="Enter a task">
                            <div class="row mb-2">
                                <div class="col">
                                    <input id="due-date-input" type="date" class="form-control">
                                </div>
                                <div class="col">
                                    <select id="priority-input" class="form-select">
                                        <option value="">Priority</option>
                                        <option value="low">Low</option>
                                        <option value="medium" selected>Medium</option>
                                        <option value="high">High</option>
                                    </select>
                                </div>
                            </div>
                            <button id="add-task-btn" class="btn btn-primary w-100">Add Task</button>
                        </div>

                        <ul id="task-list" class="list-group list-group-flush"></ul>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
